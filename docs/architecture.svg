<svg xmlns="http://www.w3.org/2000/svg" width="900" height="820" viewBox="0 0 900 820">
  <style>
    .box { fill:#0e1620; stroke:#2c8cc4; stroke-width:3; rx:16; ry:16; }
    .label { fill:#ffffff; font-family:Arial, sans-serif; font-size:18px; }
    .sub { fill:#cbd6e8; font-family:Arial, sans-serif; font-size:14px; }
    .arrow { fill:none; stroke:#f5f7fb; stroke-width:3; marker-end:url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#f5f7fb" />
    </marker>
  </defs>
  <rect x="300" y="30" width="300" height="80" class="box" />
  <text x="450" y="65" text-anchor="middle" class="label">Log Message</text>
  <line x1="450" y1="110" x2="450" y2="170" class="arrow" />

  <rect x="200" y="170" width="500" height="90" class="box" />
  <text x="450" y="205" text-anchor="middle" class="label">Stage A: Regex Classifier</text>
  <text x="450" y="235" text-anchor="middle" class="sub">high-confidence matches accepted</text>
  <line x1="330" y1="260" x2="330" y2="330" class="arrow" />
  <line x1="570" y1="260" x2="570" y2="330" class="arrow" />

  <rect x="170" y="330" width="260" height="80" class="box" />
  <rect x="470" y="330" width="260" height="80" class="box" />
  <text x="300" y="370" text-anchor="middle" class="label">Valid Class</text>
  <text x="300" y="395" text-anchor="middle" class="sub">regex output accepted</text>
  <text x="600" y="370" text-anchor="middle" class="label">Unknown / Low Confidence</text>
  <text x="600" y="395" text-anchor="middle" class="sub">route to Stage B</text>
  <line x1="600" y1="410" x2="600" y2="520" class="arrow" />

  <rect x="110" y="470" width="240" height="120" rx="14" ry="14" fill="#132039" stroke="#6fb7fc" stroke-width="2" />
  <text x="230" y="505" text-anchor="middle" class="label">LLM-tier Intercept</text>
  <text x="230" y="530" text-anchor="middle" class="sub">Workflow Error</text>
  <text x="230" y="550" text-anchor="middle" class="sub">Deprecation Warning</text>
  <text x="230" y="570" text-anchor="middle" class="sub">and low-confidence fallback</text>
  <line x1="350" y1="520" x2="380" y2="520" class="arrow" />

  <rect x="380" y="520" width="460" height="100" class="box" />
  <text x="610" y="560" text-anchor="middle" class="label">Stage B: ML Classifier (SVM)</text>
  <text x="610" y="585" text-anchor="middle" class="sub">confidence threshold + LLM fallback</text>
  <line x1="610" y1="620" x2="610" y2="650" class="arrow" />

  <rect x="380" y="650" width="460" height="80" class="box" />
  <text x="610" y="690" text-anchor="middle" class="label">Final Classification Result</text>
  <text x="610" y="715" text-anchor="middle" class="sub">CSV + audit log output</text>
</svg>